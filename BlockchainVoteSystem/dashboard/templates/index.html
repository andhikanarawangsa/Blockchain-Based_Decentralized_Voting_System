<!DOCTYPE html>
<html>
<head>
  <title>Blockchain Voting Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .header {
      text-align: center;
      padding: 18px;
      border-bottom: 1px solid #1e293b;
    }

    .author {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .container {
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .title {
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 10px;
    }

    /* VOTE VISUALIZATION */
    .bar {
      margin: 6px 0;
    }

    .bar-label {
      font-size: 14px;
    }

    .bar-fill {
      height: 10px;
      background: #38bdf8;
      border-radius: 5px;
      margin-top: 4px;
    }

    /* NODE LIST */
    .nodes {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .node {
      flex: 1;
      min-width: 220px;
      background: #0f172a;
      border: 1px solid #334155;
      padding: 10px;
      border-radius: 10px;
    }

    .status-ok { color: #22c55e; }
    .status-sync { color: #facc15; }
    .status-off { color: #ef4444; }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #64748b;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>Blockchain Voting Dashboard</h2>
  <div class="author">
    by Andhika Narawangsa Susilo • github.com/andhikanarawangsa
  </div>
</div>

<div class="container">

  <!-- VOTE VISUALIZATION -->
  <div class="card">
    <div class="title">VOTE VISUALIZATION</div>
    <div id="results"></div>
  </div>

  <!-- NODE SECTION -->
  <div class="card">
    <div class="title">NODES</div>
    <div class="nodes" id="nodes"></div>
  </div>

  <div class="footer" id="footer">
    Last update: -
  </div>

</div>

<script>
const nodes = [
  "http://127.0.0.1:5000",
  "http://127.0.0.1:5001"
];

async function fetchNode(url) {
  try {
    const res = await fetch(url + "/chain");
    return await res.json();
  } catch (e) {
    return null;
  }
}

function statusText(node) {
  if (!node) return { text: "OFFLINE", cls: "status-off" };
  return { text: "OK", cls: "status-ok" };
}

async function update() {

  // ---------------- RESULTS (GLOBAL VIEW) ----------------
  let aggregate = {};

  for (let url of nodes) {
    let data = await fetchNode(url);
    if (!data) continue;

    let chain = data.chain;
    let last = chain[chain.length - 1];

    if (last && last.data) {
      for (let v of last.data) {
        aggregate[v.candidate] = (aggregate[v.candidate] || 0) + 1;
      }
    }
  }

  let resultsHTML = "";
  let max = Math.max(...Object.values(aggregate), 1);

  for (let [k, v] of Object.entries(aggregate)) {
    resultsHTML += `
      <div class="bar">
        <div class="bar-label">${k} (${v})</div>
        <div class="bar-fill" style="width:${(v/max)*100}%"></div>
      </div>
    `;
  }

  document.getElementById("results").innerHTML = resultsHTML;

  // ---------------- NODES ----------------
  let nodeHTML = "";

  for (let url of nodes) {
    let data = await fetchNode(url);

    let chainLen = data ? data.chain.length : 0;
    let pending = data ? data.pending_votes.length : 0;

    let st = statusText(data);

    nodeHTML += `
      <div class="node">
        <div><b>${url}</b></div>
        <div>Chain: ${chainLen}</div>
        <div>Pending: ${pending}</div>
        <div>Status: <span class="${st.cls}">${st.text}</span></div>
      </div>
    `;
  }

  document.getElementById("nodes").innerHTML = nodeHTML;

  document.getElementById("footer").innerText =
    "Last update: " + new Date().toLocaleTimeString();
}

update();
setInterval(update, 2000);
</script>

</body>
</html>
