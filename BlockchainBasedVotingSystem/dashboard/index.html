<!-- Description:
Web dashboard for monitoring decentralized voting blockchain nodes,
displaying real-time node status, network peers, and voting results visualization.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blockchain Voting Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="header">
    <h1>Decentralized Blockchain Voting System Dashboard</h1>
    <p>by Andhika Narawangsa Susilo - https://github.com/andhikanarawangsa</p>
  </div>

  <!-- STATS -->
<div class="stats">
  <div class="stat-box">
    <h3>Alive Nodes</h3>
    <h3 id="aliveNodes">0</h3>
  </div>
</div>

  <!-- VOTE RESULTS -->
  <div class="container">
    <h2>Live Vote Results 📊</h2>
    <div id="results"></div>
  </div>
  
  <!-- NODE GRID -->
  <div class="container">
    <h2>Node Status</h2>
    <div id="nodes" class="node-grid"></div>
  </div>



  <script src="app.js"></script>
</body>
</html>
